<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Railway Test</title>
    <script>
        function sayHello() {
            fetch('/hello')
                .then(response => response.text())
                .then(data => {
                    document.getElementById('result').textContent = data;
                });
        }
    </script>
</head>
<body>
<h1 th:text="${msg}"></h1>
<p>感动常在</p>
<button onclick="sayHello()">请点击我</button>
<p id="result"></p>
</body>
</html>
